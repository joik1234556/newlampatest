version: '3.9'

services:
  easy-mods-backend:
    build: .
    image: easy-mods-backend:latest
    container_name: easy-mods-backend
    restart: unless-stopped
    environment:
      PORT: 3000
      CORS_ORIGIN: "*"
      CACHE_TTL_MS: 600000
      RATE_LIMIT_WINDOW_MS: 60000
      RATE_LIMIT_MAX: 60
      JACKETT_URL: "http://jackett:9117"
      JACKETT_KEY: "PUT_YOUR_JACKETT_KEY"
      TORR_SERVERS: "http://torrserver-1:8090,http://torrserver-2:8090"
      STREAM_PUBLIC_BASE: "https://stream.your-domain.com"
    ports:
      - "3000:3000"
    depends_on:
      - jackett
      - torrserver-1
      - torrserver-2

  jackett:
    image: lscr.io/linuxserver/jackett:latest
    container_name: jackett
    restart: unless-stopped
    environment:
      PUID: 1000
      PGID: 1000
      TZ: Europe/Kyiv
      AUTO_UPDATE: "true"
    volumes:
      - ./docker/jackett-config:/config
      - ./docker/downloads:/downloads
    ports:
      - "9117:9117"

  torrserver-1:
    image: ghcr.io/yourok/torrserver:latest
    container_name: torrserver-1
    restart: unless-stopped
    environment:
      TS_PORT: 8090
      TS_DONTKILL: 1
    volumes:
      - ./docker/torrserver-1:/opt/ts
    ports:
      - "8091:8090"

  torrserver-2:
    image: ghcr.io/yourok/torrserver:latest
    container_name: torrserver-2
    restart: unless-stopped
    environment:
      TS_PORT: 8090
      TS_DONTKILL: 1
    volumes:
      - ./docker/torrserver-2:/opt/ts
    ports:
      - "8092:8090"
